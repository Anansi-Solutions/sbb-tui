name: ci

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: jdx/mise-action@v2

      # Run the same build, vet, test and lint steps as the local
      # git hooks, so hk.pkl stays the single source of truth.
      - name: hk check
        run: hk check --all
